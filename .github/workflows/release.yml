name: Release

# Release automation entrypoint. Two paths, both of which end up calling the
# reusable publish.yml — so the OIDC token's entrypoint workflow is always
# `release.yml`, matching the npm Trusted Publishers (this is why publishing
# lives behind this filename and not publish.yml directly).
#
#  - push to main: release-please opens/updates a single "Release PR" that bumps
#    the version + writes CHANGELOG. Merging it creates the vX.Y.Z tag + Release
#    and, in the same run, publishes to npm. (The default GITHUB_TOKEN can't make
#    the Release re-trigger another workflow, so we call publish.yml directly —
#    no PAT needed.)
#  - manual workflow_dispatch with a version: publishes that exact version
#    (e.g. to re-publish a release whose npm step failed, or to cut a prerelease).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Publish this exact version now (no v prefix, e.g. 0.2.1)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    # Only the automated push path runs release-please; manual dispatch goes
    # straight to publishing the requested version.
    if: ${{ github.event_name == 'push' }}
    outputs:
      # Manifest mode with a package at npm/movelite -> outputs are path-prefixed.
      release_created: ${{ steps.rp.outputs['npm/movelite--release_created'] }}
      version: ${{ steps.rp.outputs['npm/movelite--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # config-file / manifest-file default to release-please-config.json
          # and .release-please-manifest.json at the repo root.

  publish:
    name: Publish release
    needs: release-please
    # Publish when release-please just cut a release (push), or always on a
    # manual dispatch. `always()` lets this run even though release-please is
    # skipped on dispatch.
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release-please.outputs.version }}
    secrets: inherit
