name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (no v prefix, e.g. 0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libssl-dev libudev-dev clang

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Cache cargo registry + aptos-core target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .aptos-core/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.toml', 'build.sh') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build movelite
        run: bash build.sh

      - name: Strip binary
        # Strip embedded debug info so the published platform package stays
        # small (unstripped Linux ELF is ~1.5GB). Native strip per runner.
        run: strip target/movelite

      - name: Smoke test
        run: ./target/movelite --help

      - uses: actions/upload-artifact@v4
        with:
          name: movelite-${{ matrix.target }}
          path: target/movelite
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to >= 11.5.1 for Trusted Publishers
        # OIDC + provenance only ship in npm >= 11.5.1; Node 20 bundles ~10.x.
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve and validate version
        id: version
        # Read both raw inputs via `env:` (never inline `${{ }}` into the
        # script) so a poisoned release tag / dispatch input can't break out of
        # this step's shell. Strip a leading `v` from release tags, then enforce
        # strict semver before any downstream step (publish-npm.sh) consumes it.
        env:
          RAW_RELEASE_TAG: ${{ github.event.release.tag_name }}
          RAW_DISPATCH_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="${RAW_RELEASE_TAG#v}"
          else
            VERSION="$RAW_DISPATCH_VERSION"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Resolved version '$VERSION' is not valid semver." >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish packages (Trusted Publishers + provenance)
        # Authenticates via GitHub Actions OIDC (id-token: write). Requires a
        # Trusted Publisher configured on npmjs.com for each package. No
        # NPM_TOKEN secret consumed.
        run: bash scripts/publish-npm.sh "${{ steps.version.outputs.value }}"
